# This rule is not used by the project geass itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the geass.geass.dev.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: geass
    app.kubernetes.io/managed-by: kustomize
  name: geassobjectstore-editor-role
rules:
- apiGroups:
  - geass.geass.dev
  resources:
  - geassobjectstores
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - geass.geass.dev
  resources:
  - geassobjectstores/status
  verbs:
  - get
