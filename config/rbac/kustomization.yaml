# if you do not want those helpers be installed with your Project.
- geassobjectstore_admin_role.yaml
- geassobjectstore_editor_role.yaml
- geassobjectstore_viewer_role.yaml
- geasscache_admin_role.yaml
- geasscache_editor_role.yaml
- geasscache_viewer_role.yaml
- geassdatabase_admin_role.yaml
- geassdatabase_editor_role.yaml
- geassdatabase_viewer_role.yaml
- geassapp_admin_role.yaml
- geassapp_editor_role.yaml
- geassapp_viewer_role.yaml
- geassnode_admin_role.yaml
- geassnode_editor_role.yaml
- geassnode_viewer_role.yaml
- geasscluster_admin_role.yaml
