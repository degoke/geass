---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - geass.geass.dev
  resources:
  - geassclusters
  - geassnodes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - geass.geass.dev
  resources:
  - geassclusters/finalizers
  - geassnodes/finalizers
  verbs:
  - update
- apiGroups:
  - geass.geass.dev
  resources:
  - geassclusters/status
  - geassnodes/status
  verbs:
  - get
  - patch
  - update
